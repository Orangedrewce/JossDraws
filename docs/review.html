<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Leave a Review | JossDraws</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    :root { --primary-color: #333; --bg-color: #f9f9f9; --card-bg: #ffffff; }
    body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg-color); color: var(--primary-color); display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 1rem; }
    .review-container { background: var(--card-bg); padding: 2.5rem; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); width: 100%; max-width: 500px; }
    input, select, textarea { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 6px; margin-bottom: 0.5rem; box-sizing: border-box; }
    
    /* Countdown Style */
    #charCounter { 
        text-align: right; 
        font-size: 0.85rem; 
        color: #666; 
        margin-bottom: 1.5rem; 
        font-variant-numeric: tabular-nums; /* Prevents jittering numbers */
    }
    
    .btn { background: #000; color: #fff; padding: 0.75rem 1.5rem; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; width: 100%; }
    .btn:disabled { background: #ccc; cursor: not-allowed; }
    .hidden { display: none; }
    .loader { text-align: center; color: #666; }
    .error-screen { text-align: center; color: #d32f2f; }
  </style>
</head>
<body>

  <main class="review-container">
    
    <div id="loadingState" class="loader">
      <h3>Validating Link...</h3>
    </div>

    <div id="invalidState" class="hidden error-screen">
      <h2>Link Invalid or Expired</h2>
      <p>This review link has already been used or has expired.</p>
    </div>

    <div id="formState" class="hidden">
      <h2>Share Your Experience</h2>
      <p style="text-align: center; color: #666; margin-bottom: 2rem;">I'd love to hear what you think!</p>

      <form id="reviewForm">
        <label>Name</label>
        <input type="text" id="clientName" placeholder="e.g. Joslynn L." required>

        <label>Rating</label>
        <select id="ratingScore" required>
            <option value="5">⭐⭐⭐⭐⭐ (5 Stars)</option>
            <option value="4">⭐⭐⭐⭐ (4 Stars)</option>
            <option value="3">⭐⭐⭐ (3 Stars)</option>
            <option value="2">⭐⭐ (2 Stars)</option>
            <option value="1">⭐ (1 Star)</option>
        </select>

        <label>Review</label>
        <textarea id="reviewText" rows="5" maxlength="280" placeholder="Loved the print..." required></textarea>
        
        <div id="charCounter">280 remaining</div>
        
        <button type="submit" class="btn">Submit Review</button>
      </form>
    </div>

    <div id="successState" class="hidden" style="text-align: center; color: green;">
      <h2>Thank You!</h2>
      <p>Your review has been submitted securely.</p>
    </div>

  </main>

<script>
    // --- HIDE ANY DEBUG ELEMENTS ---
    (function() {
      const debugEl = document.getElementById('debugBlock');
      if (debugEl) debugEl.remove();
      document.querySelectorAll('[id*="debug"], [class*="debug"], pre').forEach(el => {
        if (el.textContent.includes('tokenID') || el.textContent.includes('fetchedToken')) {
          el.remove();
        }
      });
    })();

    // --- CONFIGURATION ---
    const SUPABASE_URL = 'https://pciubbwphwpnptgawgok.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_jz1pWpo7TDvURxQ8cqP06A_xc4ckSwv'; 
    const db = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // --- DOM ELEMENTS ---
    const loader = document.getElementById('loadingState');
    const invalidScreen = document.getElementById('invalidState');
    const formScreen = document.getElementById('formState');
    const successScreen = document.getElementById('successState');
    const form = document.getElementById('reviewForm');
    
    // --- COUNTER LOGIC ---
    const textarea = document.getElementById('reviewText');
    const counterDisplay = document.getElementById('charCounter');
    const MAX_CHARS = 280;

    if (textarea) {
        textarea.addEventListener('input', () => {
        const currentLength = textarea.value.length;
        const remaining = MAX_CHARS - currentLength;
        counterDisplay.textContent = `${remaining} remaining`;
        });
    }

    // --- GLOBAL VARIABLE TO HOLD THE TAG ---
    let globalSource = null;

    const urlParams = new URLSearchParams(window.location.search);
    const tokenID = urlParams.get('token');

    // --- 1. VALIDATE TOKEN ---
    async function validateToken() {
      if (!tokenID) { return showError(); }

      const { data, error } = await db
        .from('tokens')
        .select('id, is_used, expires_at, source')
        .eq('id', tokenID)
        .single();

      if (error || !data || data.is_used) {
        showError();
      } else if (new Date(data.expires_at) < new Date()) {
        showError();
      } else {
        // --- CAPTURE THE SOURCE FROM THE TOKEN ---
        globalSource = data.source ? String(data.source).trim() : null;
        
        // Clean up any debug displays
        const debugElements = document.querySelectorAll('[id*="debug"], [id*="Debug"], [class*="debug"]');
        debugElements.forEach(el => el.remove());
        document.querySelectorAll('*').forEach(el => {
          if (el.textContent && (el.textContent.includes('tokenID') || el.textContent.includes('fetchedToken') || el.textContent.includes('globalSource'))) {
            if (el.tagName === 'PRE' || el.id.includes('debug') || el.className.includes('debug')) {
              el.remove();
            }
          }
        });
        
        loader.classList.add('hidden');
        formScreen.classList.remove('hidden');
      }
    }

    function showError() {
      loader.classList.add('hidden');
      invalidScreen.classList.remove('hidden');
    }

    // --- 2. SUBMIT FORM ---
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = form.querySelector('button');
      btn.disabled = true;
      btn.innerText = "Processing...";

      const name = document.getElementById('clientName').value;
      const text = document.getElementById('reviewText').value;
      const rating = document.getElementById('ratingScore').value;

      // --- SEND DATA TO DB ---
      const reviewPayload = {
        client_name: name,
        review_text: text,
        rating: parseInt(rating, 10),
        token_id: tokenID,
        source: globalSource || 'general'
      };
      const { data: reviewData, error: reviewError } = await db
        .from('reviews')
        .insert([reviewPayload])
        .select('id, source')
        .single();

      if (reviewError) {
        alert("Error: " + reviewError.message);
        btn.disabled = false;
        btn.innerText = "Submit Review";
        return;
      }

      // Mark token as used
      await db.from('tokens').update({ is_used: true }).eq('id', tokenID);

      formScreen.classList.add('hidden');
      successScreen.classList.remove('hidden');
    });

    validateToken();
  </script>
</body>
</html>
